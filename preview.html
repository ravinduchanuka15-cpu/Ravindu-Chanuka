<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ravindu Chanuka | PREVIEW</title>
  <link rel="stylesheet" href="./src/index.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Mock Icons ---
    const IconMenu = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
    const IconArrowRight = () => <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 9h10M10 5l4 4-4 4"/></svg>;

    // --- Components ---
    const Navbar = ({ currentPath, setPath }) => (
      <nav className="navbar">
        <a href="#" onClick={(e) => { e.preventDefault(); setPath('/'); }} className="nav-brand">
          RAVINDU <span className="gradient-text">CHANUKA</span>
        </a>
        <div className="nav-links">
          <a href="#" onClick={(e) => { e.preventDefault(); setPath('/'); }} className={`nav-link ${currentPath === '/' ? 'active' : ''}`}>Home</a>
          <a href="#" onClick={(e) => { e.preventDefault(); setPath('/about'); }} className={`nav-link ${currentPath === '/about' ? 'active' : ''}`}>About</a>
          <a href="#" onClick={(e) => { e.preventDefault(); setPath('/projects'); }} className={`nav-link ${currentPath === '/projects' ? 'active' : ''}`}>Projects</a>
          <a href="#" onClick={(e) => { e.preventDefault(); setPath('/contact'); }} className={`nav-link ${currentPath === '/contact' ? 'active' : ''}`}>Contact</a>
        </div>
      </nav>
    );

    const Home = ({ setPath }) => (
      <div className="hero-section">
        <div className="hero-content">
          <div className="hero-subtitle">Welcome to my universe</div>
          <h1 className="hero-title">
            Hi, I am <br/>
            <span className="gradient-text">Ravindu Chanuka</span>
          </h1>
          <p className="hero-desc">
            A passionate software developer creating stunning, interactive, and high-performance digital experiences. I specialize in building modern scalable applications.
          </p>
          <div className="hero-buttons">
            <button onClick={() => setPath('/projects')} className="btn btn-primary" style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              Explore Work <IconArrowRight />
            </button>
            <button onClick={() => setPath('/contact')} className="btn btn-outline">
              Hire Me
            </button>
          </div>
        </div>
        <div className="hero-image-wrapper">
          <div className="profile-image-container">
            <img src="./public/profile.jpg" alt="Ravindu Chanuka" onError={(e) => {
               e.target.onerror = null;
               e.target.src = "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=800&q=80";
            }} />
          </div>
        </div>
      </div>
    );

    const About = () => (
      <div className="page-header" style={{ animation: 'fadeIn 0.8s ease' }}>
        <h1><span className="gradient-text">About</span> Me</h1>
        <div style={{ maxWidth: '800px', margin: '2rem auto', textAlign: 'left', lineHeight: '1.8', fontSize: '1.2rem', color: 'var(--text-muted)' }}>
          <div className="glass-card" style={{ marginBottom: '2rem' }}>
            <p style={{ marginBottom: '1.5rem' }}>Hello! I'm <strong>Ravindu Chanuka</strong>, an inventive and highly adaptable developer who loves exploring the boundaries of modern web development.</p>
            <p>I focus strongly on user experience and visual perfection.</p>
          </div>
          <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: 'var(--text-main)', textAlign: 'center' }}>My Tech Stack</h2>
          <div className="skills-grid" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', textAlign: 'center' }}>
            {['HTML5', 'CSS3', 'JavaScript', 'React.js', 'Node.js', 'Express', 'Vite', 'Tailwind CSS'].map(skill => (
              <div key={skill} className="glass-card" style={{ padding: '1rem', borderTop: '2px solid var(--accent)' }}>
                <strong style={{ color: 'var(--text-main)' }}>{skill}</strong>
              </div>
            ))}
          </div>
        </div>
      </div>
    );

    const Projects = () => {
      const projectData = [
        { id: 1, title: "R.C. Mobile Store", description: "Premium mobile web store.", image: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800&q=80", tech: ["HTML", "CSS", "React"] },
        { id: 2, title: "kESHI Cream", description: "Elegant landing page for cosmetic cream.", image: "https://images.unsplash.com/photo-1556228578-0d85b1a4d571?w=800&q=80", tech: ["HTML", "Tailwind"] },
        { id: 3, title: "N.K Pet Shop", description: "Vibrant pet adoption store.", image: "https://images.unsplash.com/photo-1583337130417-3346a1be7dee?w=800&q=80", tech: ["React", "CSS3", "Node.js"] },
        { id: 4, title: "Ceylon Touris", description: "Immersive tourism website.", image: "https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?w=800&q=80", tech: ["React", "Node.js"] }
      ];

      return (
        <div className="page-header" style={{ animation: 'fadeIn 0.8s ease' }}>
          <h1>Featured <span className="gradient-text">Work</span></h1>
          <div className="projects-grid" style={{ marginTop: '3rem', textAlign: 'left' }}>
            {projectData.map(p => (
              <div key={p.id} className="glass-card">
                <img src={p.image} alt={p.title} className="project-image" />
                <h3 className="project-title">{p.title}</h3>
                <p className="project-desc">{p.description}</p>
                <div className="project-tech">
                  {p.tech.map(t => <span key={t} className="tech-tag">{t}</span>)}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const App = () => {
      const [currentPath, setPath] = useState('/');

      return (
        <div className="app-container">
          <Navbar currentPath={currentPath} setPath={setPath} />
          <main className="main-content">
            {currentPath === '/' && <Home setPath={setPath} />}
            {currentPath === '/about' && <About />}
            {currentPath === '/projects' && <Projects />}
            {currentPath === '/contact' && (
              <div className="page-header" style={{ animation: 'fadeIn 0.8s ease' }}>
                <h1>Get in <span className="gradient-text">Touch</span></h1>
                <div className="contact-info glass-card" style={{ maxWidth: '400px', margin: '3rem auto', textAlign: 'left', padding: '2rem' }}>
                  <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Email Me</p>
                  <p style={{ fontSize: '1.2rem', fontWeight: '600', marginBottom: '1.5rem', color: 'var(--accent)' }}>ravinduchanuka15@gmail.com</p>
                  <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Call Me</p>
                  <p style={{ fontSize: '1.2rem', fontWeight: '600', marginBottom: '1.5rem' }}>+94 74 224 4182</p>
                  <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>LinkedIn</p>
                  <a href="https://www.linkedin.com/in/ravindu-chanuka-111176373" target="_blank" rel="noopener noreferrer" style={{ fontSize: '1.2rem', fontWeight: '600', color: 'var(--accent-2)', textDecoration: 'none' }}>ravindu-chanuka</a>
                </div>
                <div style={{ marginTop: '2rem' }}>
                    <div className="btn btn-primary">This is a preview version of the form!</div>
                </div>
              </div>
            )}
          </main>
          <footer style={{ textAlign: 'center', padding: '2rem', color: 'var(--text-muted)', borderTop: '1px solid var(--border)', marginTop: 'auto' }}>
            <p>&copy; {new Date().getFullYear()} Ravindu Chanuka.</p>
            <p style={{ fontSize: '0.8rem', marginTop: '0.5rem' }}>Full Stack Project Output</p>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
